name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    env:
      # Prisma needs this set for `generate`; no real DB is contacted (pages are
      # dynamic, tests are pure), so a local file URL is enough.
      DATABASE_URL: "file:./ci.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
